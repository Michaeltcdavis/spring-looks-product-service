# Application Configuration
spring.application.name=product-service
server.port=8080

# MongoDB Configuration (for local development only)
# Production uses MONGODB_CONNECTION_STRING in application-prod.properties
spring.data.mongodb.uri=mongodb://${MONGO_USERNAME:root}:${MONGO_PASSWORD:password}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:product-service}?authSource=admin

# API Documentation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Actuator Configuration for Health Checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mongodb.enabled=true

# Logging Configuration
logging.level.com.springlooks=INFO
logging.level.org.springframework.data.mongodb=WARN

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

